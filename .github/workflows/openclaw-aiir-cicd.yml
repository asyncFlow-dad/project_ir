name: openclaw-aiir-cicd

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: openclaw-aiir-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Python tests
        run: |
          python3 -m unittest discover -s tests
          python3 -m compileall -q ir_search scripts tests

      - name: Render OpenClaw config
        run: |
          export OPENCLAW_GATEWAY_TOKEN=ci-test-token
          export OPENCLAW_ROLE=dev
          python3 scripts/render_openclaw_config.py
          python3 -c "import json; json.load(open('openclaw/openclaw.json'))"

      - name: Install Helm
        uses: azure/setup-helm@v4

      - name: Helm lint
        run: |
          helm lint charts/openclaw-role -f charts/openclaw-role/values-ci.yaml
          helm template dev charts/openclaw-role -f charts/openclaw-role/values-dev.yaml -f charts/openclaw-role/values-ci.yaml >/tmp/dev.yaml
          helm template qa charts/openclaw-role -f charts/openclaw-role/values-qa.yaml -f charts/openclaw-role/values-ci.yaml >/tmp/qa.yaml
          helm template pm charts/openclaw-role -f charts/openclaw-role/values-pm.yaml -f charts/openclaw-role/values-ci.yaml >/tmp/pm.yaml
