role: dev
namespace: openclaw-dev
timezone: Asia/Seoul

image:
  repository: ghcr.io/openclaw/openclaw
  tag: "2026.5.18-beta.1-slim"

gateway:
  port: 18789

telegram:
  ownerId: "6579963228"
  webhookPath: /telegram/dev
  webhookPort: 8787
  agentEmoji: "🛠️"

anthropic:
  modelId: claude-sonnet-4-5
  modelName: Claude Sonnet 4.5

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

ingress:
  enabled: true
  host: bots.miiinssong.shop
  className: nginx

initImage:
  repository: ghcr.io/asyncflow-dad/envsubst
  tag: "1.0"

podSecurity:
  enforce: restricted

persistence:
  state:
    size: 5Gi
    hostPath: ""
  workspace:
    size: 10Gi
    hostPath: ""

secrets:
  gatewayToken: ""
  telegramBotToken: ""
  telegramOwnerId: ""
  telegramWebhookSecret: ""
