role: dev
namespace: openclaw-dev
timezone: Asia/Seoul

image:
  repository: ghcr.io/your-org/openclaw
  tag: "2026.5.12"

gateway:
  port: 18789

telegram:
  ownerId: "123456789"
  webhookPath: /telegram/dev
  webhookPort: 8787
  agentEmoji: "🛠️"

ollama:
  baseUrl: http://ollama.aiir-core.svc.cluster.local:11434
  modelId: llama3.2
  modelName: Llama 3.2
  contextWindow: 8192
  maxTokens: 4096

resources:
  requests:
    cpu: 500m
    memory: 1Gi
  limits:
    cpu: "2"
    memory: 4Gi

ingress:
  enabled: true
  host: bots.example.com
  className: nginx

initImage:
  repository: ghcr.io/your-org/envsubst
  tag: "1.0"

secrets:
  gatewayToken: ""
  telegramBotToken: ""
  telegramOwnerId: ""
  telegramWebhookSecret: ""
