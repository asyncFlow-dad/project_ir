{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "openclaw-role.fullname" . }}-webhook
  namespace: {{ .Values.namespace }}
spec:
  ingressClassName: {{ .Values.ingress.className }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: {{ .Values.telegram.webhookPath }}
            pathType: Prefix
            backend:
              service:
                name: {{ include "openclaw-role.fullname" . }}
                port:
                  number: {{ .Values.telegram.webhookPort }}
{{- end }}
