apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "openclaw-role.fullname" . }}
  namespace: {{ .Values.namespace }}
spec:
  replicas: 1
  selector:
    matchLabels:
      app: {{ include "openclaw-role.fullname" . }}
  template:
    metadata:
      labels:
        app: {{ include "openclaw-role.fullname" . }}
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: render-openclaw-config
          image: "{{ .Values.initImage.repository }}:{{ .Values.initImage.tag }}"
          command: ["/bin/sh", "-c"]
          args:
            - |
              envsubst < /config/openclaw.json5.tpl > /state/openclaw.json
              chmod 600 /state/openclaw.json
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
          envFrom:
            - secretRef:
                name: {{ include "openclaw-role.fullname" . }}-secret
          volumeMounts:
            - name: config-template
              mountPath: /config
            - name: state
              mountPath: /state
      containers:
        - name: openclaw
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command: ["node", "dist/index.js", "gateway", "--bind", "lan", "--port", "{{ .Values.gateway.port }}"]
          envFrom:
            - secretRef:
                name: {{ include "openclaw-role.fullname" . }}-secret
          env:
            - name: HOME
              value: /home/node
            - name: OPENCLAW_HOME
              value: /home/node
            - name: OPENCLAW_STATE_DIR
              value: /home/node/.openclaw
            - name: OPENCLAW_CONFIG_PATH
              value: /home/node/.openclaw/openclaw.json
            - name: OPENCLAW_CONFIG_DIR
              value: /home/node/.openclaw
            - name: OPENCLAW_WORKSPACE_DIR
              value: /data/workspace
            - name: TZ
              value: {{ .Values.timezone | quote }}
          ports:
            - name: gateway
              containerPort: {{ .Values.gateway.port }}
            - name: telegram-webhook
              containerPort: {{ .Values.telegram.webhookPort }}
          readinessProbe:
            httpGet:
              path: /readyz
              port: gateway
          livenessProbe:
            httpGet:
              path: /healthz
              port: gateway
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: state
              mountPath: /home/node/.openclaw
            - name: workspace
              mountPath: /data/workspace
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config-template
          configMap:
            name: {{ include "openclaw-role.fullname" . }}-config
        - name: state
          persistentVolumeClaim:
            claimName: {{ include "openclaw-role.fullname" . }}-state
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ include "openclaw-role.fullname" . }}-workspace
        - name: tmp
          emptyDir: {}
