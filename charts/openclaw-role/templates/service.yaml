apiVersion: v1
kind: Service
metadata:
  name: {{ include "openclaw-role.fullname" . }}
  namespace: {{ .Values.namespace }}
spec:
  selector:
    app: {{ include "openclaw-role.fullname" . }}
  ports:
    - name: gateway
      port: {{ .Values.gateway.port }}
      targetPort: gateway
    - name: tg-webhook
      port: {{ .Values.telegram.webhookPort }}
      targetPort: tg-webhook
