apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "openclaw-role.fullname" . }}-state
  namespace: {{ .Values.namespace }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "openclaw-role.fullname" . }}-workspace
  namespace: {{ .Values.namespace }}
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 10Gi
