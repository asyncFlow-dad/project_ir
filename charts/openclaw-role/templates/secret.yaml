apiVersion: v1
kind: Secret
metadata:
  name: {{ include "openclaw-role.fullname" . }}-secret
  namespace: {{ .Values.namespace }}
type: Opaque
stringData:
  OPENCLAW_GATEWAY_TOKEN: {{ .Values.secrets.gatewayToken | required ".Values.secrets.gatewayToken is required" | quote }}
  TELEGRAM_BOT_TOKEN: {{ .Values.secrets.telegramBotToken | required ".Values.secrets.telegramBotToken is required" | quote }}
  TELEGRAM_OWNER_ID: {{ .Values.secrets.telegramOwnerId | required ".Values.secrets.telegramOwnerId is required" | quote }}
  TELEGRAM_ALLOW_FROM: {{ printf "[\"%s\"]" (.Values.secrets.telegramOwnerId | required ".Values.secrets.telegramOwnerId is required") | quote }}
  TELEGRAM_GROUP_ALLOW_FROM: {{ printf "[\"%s\"]" (.Values.secrets.telegramOwnerId | required ".Values.secrets.telegramOwnerId is required") | quote }}
  TELEGRAM_WEBHOOK_URL: "https://{{ .Values.ingress.host }}{{ .Values.telegram.webhookPath }}"
  TELEGRAM_WEBHOOK_SECRET: {{ .Values.secrets.telegramWebhookSecret | required ".Values.secrets.telegramWebhookSecret is required" | quote }}
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | required ".Values.secrets.anthropicApiKey is required" | quote }}
  ANTHROPIC_MODEL_ID: {{ .Values.anthropic.modelId | quote }}
  ANTHROPIC_MODEL_NAME: {{ .Values.anthropic.modelName | quote }}
  OPENCLAW_ROLE: {{ .Values.role | quote }}
  OPENCLAW_AGENT_NAME: {{ printf "AI IR %s" (.Values.role | upper) | quote }}
  OPENCLAW_AGENT_THEME: {{ .Values.role | quote }}
  OPENCLAW_AGENT_EMOJI: {{ .Values.telegram.agentEmoji | quote }}
  OPENCLAW_GATEWAY_PORT: {{ .Values.gateway.port | quote }}
  OPENCLAW_GATEWAY_BIND: lan
  OPENCLAW_WORKSPACE_DIR: /data/workspace
  TELEGRAM_WEBHOOK_HOST: "0.0.0.0"
  TELEGRAM_WEBHOOK_PATH: {{ .Values.telegram.webhookPath | quote }}
  TELEGRAM_WEBHOOK_PORT: {{ .Values.telegram.webhookPort | quote }}
  TELEGRAM_DM_POLICY: allowlist
  TELEGRAM_GROUP_POLICY: allowlist
  TELEGRAM_ENABLED: "true"
